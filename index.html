<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misk School</title>

    <!-- Your compiled CSS (from SCSS) -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
        <div id="heroSlide" class="carousel slide"> 
            <div class="carousel-arrows">
                <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/Test.avif" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h1 class="hero-caption">Test Caption 1</h1>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="img/Test.avif" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h1 class="hero-caption">Test Caption 2</h1>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="img/Test.avif" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h1 class="hero-caption">Test Caption 3</h1>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroSlide" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
        </div>
        

        <h1>npx sass scss/style.scss css/style.css --watch</h1>

    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
