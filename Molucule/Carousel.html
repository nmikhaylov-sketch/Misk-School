<script src="../node_modules/slick-carousel/slick/slick.min.js"></script>

$('.center').slick({
  centerMode: true,
  centerPadding: '60px',
  slidesToShow: 3,
  responsive: [
    {
      breakpoint: 768,

        arrows: false,
        centerMode: true,

      breakpoint: 480,

  ]
});
