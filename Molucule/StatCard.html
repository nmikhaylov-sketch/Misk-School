<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misk School</title>


    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <!-- ---------------Stat Card----------------- -->

<div class="container stat-card d-flex flex-column align-items-center bg-primary text-white rounded-4">
    <p class="h2 py-4 fw-bold">At a Glance</p>
    <div class="stat-row d-flex justify-content-center w-100">

        <div class="stat-col d-flex flex-column text-center aligh-items-center">
            <p class="display-1 text-primary-emphasis fw-bold mb-0">A</p>
            <p class="mb-0">School Buildings</p>
        </div>

        <div class="stat-col d-flex flex-column text-center aligh-items-center">
            <p class="display-1 text-primary-emphasis fw-bold">BC</p>
            <p class="mb-0">Students Max Class Sizes</p>
        </div>

        <div class="stat-col d-flex flex-column text-center aligh-items-center">
            <p class="display-1 text-primary-emphasis fw-bold">DEF+</p>
            <p class="mb-0">Co-curricular Activities</p>
        </div>
    </div>
</div>

  

    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
