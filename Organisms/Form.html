<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>


    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <!-- --------------Form--------------------- -->
        
    <!-- --------------Form--------------------- -->
        
    <section class="py-11 mx-9 mx-xs-12 mx-md-14 mt-10 mt-md-12 mt-lg-13">
        <div class="row">
            <div class="col-12 col-md-4 mb-7 mb-md-3">
            <h2 class="text-black">Apply Now</h2>
            </div>

            <div class="col-12 col-md-8">
            <form class="d-flex flex-column gap-9">

                <div>
                    <label class="form-label fw-bold text-black fs-5">Full Name</label>
                    <input type="text" class="form-control form-control-lg rounded-1" placeholder="Full Name">
                </div>

                <div>
                    <label class="form-label fw-bold text-black fs-5">Email Address</label>
                    <input type="email" class="form-control form-control-lg rounded-1" placeholder="Email Address">
                </div>

                <div>
                    <label class="form-label fw-bold text-black fs-5">Age</label>
                    <select class="form-select form-select-lg rounded-1">
                        <option selected disabled value="">Select age</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                        <option>13</option>
                    </select>
                </div>

                <div>
                <label class="form-label fw-bold text-black fs-5">Message</label>
                <textarea class="form-control form-control-lg rounded-1" rows="7" placeholder="Message"></textarea>
                </div>

                <div>
                <button type="submit" class="btn btn-primary px-9 py-3 rounded-1">Submit</button>
                </div>

            </form>
            </div>

        </div>
    </section>








    <script src="https://code.jquery.com/jquery-2.2.0.min.js" type="text/javascript"></script>
    <script src="../node_modules/slick-carousel/slick/slick.min.js"></script>
    <script src="../js/news-carousel.js"></script>

  </body>
</html>
