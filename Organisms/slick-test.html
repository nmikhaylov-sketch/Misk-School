<!DOCTYPE html>
<html>
<head>
  <title>Slick Playground</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../node_modules/slick-carousel/slick/slick.css">
  <link rel="stylesheet" type="text/css" href="../node_modules/slick-carousel/slick/slick-theme.css">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
    }

    * {
      box-sizing: border-box;
    }

    .slider {
        width: 50%;
        margin: 100px auto;
    }

    .slick-slide {
      margin: 0px 20px;
    }

    .slick-slide img {
      width: 100%;
    }

    .slick-prev:before,
    .slick-next:before {
      color: black;
    }


    .slick-slide {
      transition: all ease-in-out .3s;
      opacity: .2;
    }
    
    .slick-active {
      opacity: .5;
    }

    .slick-current {
      opacity: 1;
    }
  </style>
</head>
<body>

  <h2>Regular</h2>
  <div class="vertical-center-4 slider">
    <div><img src="https://picsum.photos/seed/1/600/400" alt="slide 1"></div>
    <div><img src="https://picsum.photos/seed/2/600/400" alt="slide 2"></div>
    <div><img src="https://picsum.photos/seed/3/600/400" alt="slide 3"></div>
    <div><img src="https://picsum.photos/seed/4/600/400" alt="slide 4"></div>
    <div><img src="https://picsum.photos/seed/5/600/400" alt="slide 5"></div>
    <div><img src="https://picsum.photos/seed/6/600/400" alt="slide 6"></div>
    <div><img src="https://picsum.photos/seed/7/600/400" alt="slide 7"></div>
    <div><img src="https://picsum.photos/seed/8/600/400" alt="slide 8"></div>
    <div><img src="https://picsum.photos/seed/9/600/400" alt="slide 9"></div>
    <div><img src="https://picsum.photos/seed/10/600/400" alt="slide 10"></div>
    
  </div>

  <h2>Center Mode</h2>
  <div class="vertical-center-3 slider">
    <div><img src="https://picsum.photos/seed/7/600/400" alt="slide 1"></div>
    <div><img src="https://picsum.photos/seed/8/600/400" alt="slide 2"></div>
    <div><img src="https://picsum.photos/seed/9/600/400" alt="slide 3"></div>
    <div><img src="https://picsum.photos/seed/10/600/400" alt="slide 4"></div>
    <div><img src="https://picsum.photos/seed/11/600/400" alt="slide 5"></div>
    <div><img src="https://picsum.photos/seed/12/600/400" alt="slide 6"></div>
  </div>

  <h2>Vertical</h2>
  <div class="vertical-center-2 slider">
    <div><img src="https://picsum.photos/seed/13/600/400" alt="slide 1"></div>
    <div><img src="https://picsum.photos/seed/14/600/400" alt="slide 2"></div>
    <div><img src="https://picsum.photos/seed/15/600/400" alt="slide 3"></div>
    <div><img src="https://picsum.photos/seed/16/600/400" alt="slide 4"></div>
    <div><img src="https://picsum.photos/seed/17/600/400" alt="slide 5"></div>
  </div>

  <h2>Variable Width</h2>
  <div class="vertical-center slider">
    <div><img src="https://picsum.photos/seed/18/350/400" alt="slide 1"></div>
    <div><img src="https://picsum.photos/seed/19/500/400" alt="slide 2"></div>
    <div><img src="https://picsum.photos/seed/20/250/400" alt="slide 3"></div>
    <div><img src="https://picsum.photos/seed/21/450/400" alt="slide 4"></div>
    <div><img src="https://picsum.photos/seed/22/300/400" alt="slide 5"></div>
  </div>

  <h2>Lazy Load</h2>
  <div class="lazy slider">
    <div><img data-lazy="https://picsum.photos/seed/23/600/400" alt="slide 1"></div>
    <div><img data-lazy="https://picsum.photos/seed/24/600/400" alt="slide 2"></div>
    <div><img data-lazy="https://picsum.photos/seed/25/600/400" alt="slide 3"></div>
    <div><img data-lazy="https://picsum.photos/seed/26/600/400" alt="slide 4"></div>
    <div><img data-lazy="https://picsum.photos/seed/27/600/400" alt="slide 5"></div>
  </div>

  <script src="https://code.jquery.com/jquery-2.2.0.min.js" type="text/javascript"></script>
  <script src="../node_modules/slick-carousel/slick/slick.js" type="text/javascript" charset="utf-8"></script>
   <script type="text/javascript">
    $(document).on('ready', function() {
      $(".vertical-center-4").slick({
        dots: true,
        vertical: true,
        centerMode: true,
        slidesToShow: 4,
        slidesToScroll: 2
      });
      $(".vertical-center-3").slick({
        dots: true,
        vertical: true,
        centerMode: true,
        slidesToShow: 3,
        slidesToScroll: 3
      });
      $(".vertical-center-2").slick({
        dots: true,
        vertical: true,
        centerMode: true,
        slidesToShow: 2,
        slidesToScroll: 2
      });
      $(".vertical-center").slick({
        dots: true,
        vertical: true,
        centerMode: true,
      });
      $(".vertical").slick({
        dots: true,
        vertical: true,
        slidesToShow: 3,
        slidesToScroll: 3
      });
      $(".regular").slick({
        dots: true,
        infinite: true,
        slidesToShow: 3,
        slidesToScroll: 3
      });
      $(".center").slick({
        dots: true,
        infinite: true,
        centerMode: true,
        slidesToShow: 5,
        slidesToScroll: 3
      });
      $(".variable").slick({
        dots: true,
        infinite: true,
        variableWidth: true
      });
      $(".lazy").slick({
        lazyLoad: 'ondemand', // ondemand progressive anticipated
        infinite: true
      });
    });
</script>

</body>
</html>
