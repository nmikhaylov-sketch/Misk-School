<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misk School</title>


    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <!-- ---------------Hero Slide----------------- -->

    <div id="heroSlide" class="carousel slide" data-bs-ride="carousel"> 
        <div class="carousel-indicators hero-padding d-flex justify-content-start z-1">
            <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#heroSlide" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>

        <div class="carousel-inner text-start">
            <div class="carousel-item hero-carousel-height active">
                <img src="../img/main.jpg" class="w-100 hero-image-height object-fit-cover" alt="...">
                <div class="position-absolute top-0 start-0 w-100 h-100 hero-overlay"></div>
                <div class="carousel-caption hero-padding col col-10 col-md-6 text-start start-0 bottom-0">
                    <h1 class="hero-title">Setting Trends for a Nation on the Move </h1>
                </div>
            </div>

            <div class="carousel-item hero-carousel-height">
                <img src="../img/main.jpg" class="w-100 hero-image-height object-fit-cover" alt="...">
                <div class="position-absolute top-0 start-0 w-100 h-100 hero-overlay"></div>
                <div class="carousel-caption hero-padding col col-10 col-md-6 text-start start-0 bottom-0">
                    <h1 class="hero-title">Setting a new educational standard for Saudi Arabia </h1>
                </div>
            </div>

            <div class="carousel-item hero-carousel-height">
                <img src="../img/main.jpg" class="w-100 hero-image-height object-fit-cover" alt="...">
                <div class="position-absolute top-0 start-0 w-100 h-100 hero-overlay"></div>
                <div class="carousel-caption hero-padding col col-10 col-md-6 text-start start-0 bottom-0">
                    <h1 class="hero-title">Setting Trends for a Nation on the Move </h1>
                </div>
            </div>

        </div>
    </div>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
