<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>node Page</title>


    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

  <!-- ---------------Node Page with image----------------- -->


    <section class="node-banner has-image position-relative pt-14">
        <!-- ----Title---- -->
        <div class="ps-auto mx-9 mx-xs-12 mx-md-14 mb-9">
        <h1>Admissions</h1>
        </div>

        <!-- ---Info-bar--- -->

        <div class="bg-primary-emphasis text-dark d-flex justify-content-between align-items-center col-10 col-sm-8 col-md-7 py-4 ps-9 ps-xs-12 ps-md-14 pe-5 pe-md-9 z-2">
            <span class="date text-black">May 15, 2023</span>

            <div class="row d-inline-block position-relative">
                <div class="d-flex gap-3 gap-sm-5 ">
                <a href="#">
                    <img src="../img/Social-Links/social-facebook.svg" class="social-link" alt="Facebook">
                </a>
                <a href="#">
                    <img src="../img/Social-Links/social-instagram.svg" class="social-link" alt="Instagram">
                </a>
                <a href="#">
                    <img src="../img/Social-Links/social-linkedin.svg" class="social-link" alt="LinkedIn">
                </a>
                <a href="#">
                    <img src="../img/Social-Links/social-x.svg" class="social-link" alt="X">
                </a>
                </div>
            </div>
        </div>

        <!-- --Image-- -->
        <div class="node-banner-image mt-n8 rounded-2 overflow-hidden ps-0 ps-md-13 ps-lg-14">
            <img class="z-0 w-100 h-100 object-fit-cover" src="../img/img7.png" alt="">
        </div>
    </section>



    <!-- ---------------Node Page without image----------------- -->
