<!DOCTYPE html>
<html>
<head>
  <title>Featured News</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../node_modules/slick-carousel/slick/slick.css">
  <link rel="stylesheet" href="../node_modules/slick-carousel/slick/slick-theme.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- ---------------carousel---------------------- -->

  <section class="overflow-x-hidden d-flex flex-column gap-7 gap-md-9 mt-12 mt-md-13 justify-content-center">
      <h2 class="mx-auto">Featured News</h2>

      <div class="news-slider justify-content-center w-100"> <!-- slick class -->

        <!-- --------------card component----------------- -->

        <div class="news-card position-relative d-flex flex-column gap-3 px-3">
          <div class="news-card-inner">
            <div class="news-image-wrap position-relative overflow-hidden rounded-3">
              <img src="../img/img3.png" class="w-100 h-100 object-fit-cover d-block" alt="">
              <span class="news-date date bg-primary text-white rounded-pill py-1 px-4">May 15, 2023</span>
            </div>
            <h3 class="text-dark mt-5 mt-md-9">Safe guarding Forums puts Safety First in Saudi Schools</h3>
            <a class="more-link stretched-link" href="#">
              <span class="more-link-text">Read More</span>
              <img class="more-link-icon" src="../img/Text_Arrow.svg" alt="">
            </a>
          </div>
        </div>

        <!-- --------------card component----------------- -->

        <div class="news-card position-relative d-flex flex-column gap-3 px-3">
          <div class="news-card-inner">
            <div class="news-image-wrap position-relative overflow-hidden rounded-3">
              <img src="../img/img2.png" class="w-100 h-100 object-fit-cover d-block" alt="">
              <span class="news-date date bg-primary text-white rounded-pill py-1 px-4">May 15, 2023</span>
            </div>
            <div> <!-- --- -->
              <h3 class="text-dark mt-5 mt-md-9">SPACE 2101: Inspiring the Scientists of Tomorrow to Re-imagine and Re-engineer the Future</h3>
              <a class="more-link stretched-link" href="#">
                <span class="more-link-text">Read More</span>
                <img class="more-link-icon" src="../img/Text_Arrow.svg" alt="">
              </a>
            </div>
          </div>
        </div>

        <!-- --------------card component----------------- -->

        <div class="news-card position-relative d-flex flex-column gap-3 px-3">
          <div class="news-card-inner">
            <div class="news-image-wrap position-relative overflow-hidden rounded-3">
              <img src="../img/img1.png" class="w-100 h-100 object-fit-cover d-block" alt="">
              <span class="news-date date bg-primary text-white rounded-pill py-1 px-4">May 15, 2023</span>
            </div>
            <h3 class="text-dark mt-5 mt-md-9">Misk Schools and AEON Partner for Climate Education</h3>
            <a class="more-link stretched-link" href="#">
              <span class="more-link-text">Read More</span>
              <img class="more-link-icon" src="../img/Text_Arrow.svg" alt="">
            </a>
          </div>
        </div>


      </div>

      <!-- -------------- Arrows ----------------- -->
          <!-- The html for the arrows are in news-carousel.js-->
      <div class="news-arrows"> </div>

      <!-- ---------See All News Button----------- -->

      <button class="btn btn-primary mx-auto px-5 py-4 px-md-8 py-md-5 rounded-pill">See All News</button>

    </section>


  <script src="../node_modules/jquery/dist/jquery.min.js"></script>
  <script src="../node_modules/slick-carousel/slick/slick.min.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utilities.js"></script>
  <script src="../js/news-carousel.js"></script>

</body>
</html>
